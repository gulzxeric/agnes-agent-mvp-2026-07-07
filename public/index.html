<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园活动 Agent MVP</title>
  <style>
    :root {
      --cyber-neon: #ff007f;
      --cyber-blue: #00f0ff;
      --cyber-bg: #0a0a12;
      --cyber-green: #00ff88;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--cyber-bg);
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
    }
    .glow-panel {
      border: 2px solid var(--cyber-blue);
      box-shadow: 0 0 15px var(--cyber-blue), inset 0 0 10px var(--cyber-blue);
      padding: 30px;
      border-radius: 8px;
      background: rgba(10, 10, 18, 0.85);
      max-width: 640px;
      width: 100%;
    }
    h2 { color: var(--cyber-neon); margin-bottom: 20px; text-align: center; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid #333; }
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      color: #666;
      font-family: inherit;
      font-size: 0.9em;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      border-bottom: 2px solid transparent;
    }
    .tab-btn:hover { color: var(--cyber-blue); }
    .tab-btn.active {
      color: var(--cyber-blue);
      border-bottom-color: var(--cyber-blue);
      box-shadow: 0 2px 8px rgba(0, 240, 255, 0.2);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; margin-bottom: 4px; color: var(--cyber-blue); font-size: 0.85em; }
    .input-group input, .input-group select, .input-group textarea {
      width: 100%;
      padding: 8px 12px;
      background: #1a1a2e;
      border: 1px solid var(--cyber-blue);
      color: #fff;
      font-family: inherit;
      border-radius: 4px;
    }
    .input-group textarea {
      min-height: 100px;
      resize: vertical;
    }
    .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
      outline: none;
      box-shadow: 0 0 8px var(--cyber-blue);
    }
    .neon-btn {
      background: transparent;
      border: 1px solid var(--cyber-neon);
      color: var(--cyber-neon);
      padding: 10px 20px;
      cursor: pointer;
      font-size: 1.1em;
      text-transform: uppercase;
      box-shadow: 0 0 10px var(--cyber-neon);
      transition: all 0.3s ease;
      width: 100%;
      font-family: inherit;
    }
    .neon-btn:hover {
      background: var(--cyber-neon);
      color: #000;
      box-shadow: 0 0 25px var(--cyber-neon);
    }
    .neon-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .neon-btn.green {
      border-color: var(--cyber-green);
      color: var(--cyber-green);
      box-shadow: 0 0 10px var(--cyber-green);
    }
    .neon-btn.green:hover {
      background: var(--cyber-green);
      color: #000;
      box-shadow: 0 0 25px var(--cyber-green);
    }

    /* Shared output */
    .output-section { margin-top: 30px; }
    .output-section h3 { color: var(--cyber-neon); margin-bottom: 8px; }
    .output-section p { line-height: 1.6; margin-bottom: 12px; color: #ccc; }
    .output-section ul { margin-bottom: 12px; padding-left: 20px; }
    .output-section ul li { margin-bottom: 4px; color: #ccc; }
    #poster-container { margin-top: 16px; text-align: center; }
    #poster-skeleton {
      width: 300px;
      height: 300px;
      background: #1a1a2e;
      border: 1px dashed var(--cyber-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      margin: 0 auto;
    }
    #poster-img {
      max-width: 300px;
      border: 2px solid #fff;
      border-radius: 4px;
    }
    .error-msg { color: #ff4444; margin-top: 12px; }
    .label-tag {
      display: inline-block;
      background: rgba(0, 240, 255, 0.15);
      border: 1px solid var(--cyber-blue);
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 0.75em;
      color: var(--cyber-blue);
      margin-bottom: 4px;
    }
    .agent-answer {
      background: rgba(0, 255, 136, 0.08);
      border: 1px solid var(--cyber-green);
      border-radius: 6px;
      padding: 16px;
      margin-top: 8px;
      white-space: pre-wrap;
      line-height: 1.8;
      color: #ddd;
    }
    .mode-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 0.7em;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .mode-badge.chain { background: rgba(255, 0, 127, 0.2); color: var(--cyber-neon); border: 1px solid var(--cyber-neon); }
    .mode-badge.react { background: rgba(0, 255, 136, 0.2); color: var(--cyber-green); border: 1px solid var(--cyber-green); }
  </style>
</head>
<body>
  <div class="glow-panel">
    <h2>⚡ 校园活动 Agent MVP</h2>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="chain">经典模式</button>
      <button class="tab-btn" data-tab="react">智能 Agent</button>
    </div>

    <!-- Tab 1: Sequential Chain -->
    <div id="tab-chain" class="tab-content active">
      <div class="input-group">
        <label>参与人数</label>
        <input type="number" id="input-members" value="4" min="1" max="100">
      </div>
      <div class="input-group">
        <label>天气状况</label>
        <select id="input-weather">
          <option value="晴朗微风的午后">☀️ 晴朗微风</option>
          <option value="阴天有点闷">☁️ 阴天</option>
          <option value="下着小雨">🌧️ 小雨</option>
          <option value="大太阳很热">🔥 大太阳</option>
        </select>
      </div>
      <div class="input-group">
        <label>预算（元/人）</label>
        <input type="number" id="input-budget" value="30" min="0" max="1000">
      </div>
      <div class="input-group">
        <label>大家心情</label>
        <select id="input-mood">
          <option value="热情高涨">🔥 热情高涨</option>
          <option value="有点疲惫">😴 有点疲惫</option>
          <option value="平淡如水">😐 平淡如水</option>
          <option value="需要放松">🧘 需要放松</option>
        </select>
      </div>
      <button class="neon-btn" id="btn-chain">🚀 开始策划</button>

      <div id="chain-output" class="output-section" style="display:none;">
        <span class="mode-badge chain">Sequential Chain</span>
        <div class="label-tag" style="margin-top:8px;">活动名称</div>
        <h3 id="act-title"></h3>
        <div class="label-tag" style="margin-top:12px;">策划思路</div>
        <p id="act-reasoning"></p>
        <div class="label-tag" style="margin-top:12px;">活动规则</div>
        <ul id="act-rules"></ul>
        <div class="label-tag" style="margin-top:12px;">惩罚机制</div>
        <p id="act-punishment"></p>
        <div id="poster-container">
          <div id="poster-skeleton">⏳ 生成海报中...</div>
          <img id="poster-img" style="display:none;" alt="活动海报"/>
        </div>
      </div>
    </div>

    <!-- Tab 2: ReAct Agent -->
    <div id="tab-react" class="tab-content">
      <div class="input-group">
        <label>告诉 Agent 你需要什么</label>
        <textarea id="input-prompt" placeholder="例如：我们4个人，天气晴朗，预算30每人，大家都很嗨，策划一个活动并生成海报">我们4个人，天气晴朗，预算30每人，大家都很嗨，策划一个活动并生成海报</textarea>
      </div>
      <button class="neon-btn green" id="btn-react">🤖 启动 Agent</button>

      <div id="react-output" class="output-section" style="display:none;">
        <span class="mode-badge react">ReAct Agent</span>
        <div class="label-tag" style="margin-top:8px;">Agent 最终回答</div>
        <div id="agent-answer" class="agent-answer"></div>
      </div>
    </div>

    <div id="error-area" class="error-msg" style="display:none;"></div>
  </div>

  <script>
    function renderAnswer(container, text) {
      const imageUrls = [];
      const markdownImagePattern = /!\[([^\]]*)\]\(([^)]+)\)/g;
      const bareUrlPattern = /https?:\/\/[^\s]+/g;
      const imageExtPattern = /\.(jpg|jpeg|png|gif|webp|bmp)(\?[^\s]*)?$/i;

      let cleanText = text.replace(markdownImagePattern, (_, alt, url) => {
        imageUrls.push(url);
        return '';
      });

      let match;
      while ((match = bareUrlPattern.exec(cleanText)) !== null) {
        const url = match[0];
        if (imageExtPattern.test(url) && !imageUrls.includes(url)) {
          imageUrls.push(url);
        }
      }

      container.textContent = cleanText;

      imageUrls.forEach(url => {
        const img = document.createElement('img');
        img.src = url;
        img.alt = 'poster';
        img.style.cssText = 'max-width:100%;border:2px solid var(--cyber-green);border-radius:4px;margin:8px 0;display:block;';
        container.appendChild(img);
      });
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        document.getElementById('error-area').style.display = 'none';
      });
    });

    // --- Sequential Chain ---
    document.getElementById('btn-chain').addEventListener('click', async () => {
      const btn = document.getElementById('btn-chain');
      const output = document.getElementById('chain-output');
      const errorArea = document.getElementById('error-area');
      const skeleton = document.getElementById('poster-skeleton');
      const posterImg = document.getElementById('poster-img');

      errorArea.style.display = 'none';
      output.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '⏳ 策划中...';

      try {
        const response = await fetch('/api/plan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            memberCount: parseInt(document.getElementById('input-members').value),
            weather: document.getElementById('input-weather').value,
            budget: parseInt(document.getElementById('input-budget').value),
            mood: document.getElementById('input-mood').value
          })
        });

        const resData = await response.json();

        if (resData.success) {
          const payload = resData.data;
          document.getElementById('act-title').textContent = payload.activityName;
          document.getElementById('act-reasoning').textContent = payload.reasoning;
          document.getElementById('act-punishment').textContent = payload.punishment;

          const rulesList = document.getElementById('act-rules');
          rulesList.innerHTML = '';
          (payload.rules || []).forEach(rule => {
            const li = document.createElement('li');
            li.textContent = rule;
            rulesList.appendChild(li);
          });

          posterImg.style.display = 'none';
          skeleton.style.display = 'flex';
          posterImg.src = payload.posterUrl;
          posterImg.onload = () => {
            skeleton.style.display = 'none';
            posterImg.style.display = 'block';
          };
          posterImg.onerror = () => {
            skeleton.textContent = '⚠️ 海报加载失败';
          };

          output.style.display = 'block';
        } else {
          errorArea.textContent = '服务端错误: ' + (resData.error || '未知错误');
          errorArea.style.display = 'block';
        }
      } catch (err) {
        errorArea.textContent = '网络错误: ' + err.message;
        errorArea.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '🚀 开始策划';
      }
    });

    // --- ReAct Agent ---
    document.getElementById('btn-react').addEventListener('click', async () => {
      const btn = document.getElementById('btn-react');
      const output = document.getElementById('react-output');
      const answerEl = document.getElementById('agent-answer');
      const errorArea = document.getElementById('error-area');

      errorArea.style.display = 'none';
      output.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '⏳ Agent 思考中...';

      try {
        const response = await fetch('/api/agent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: document.getElementById('input-prompt').value
          })
        });

        const resData = await response.json();

        if (resData.success) {
          renderAnswer(answerEl, resData.data.answer);
          output.style.display = 'block';
        } else {
          errorArea.textContent = 'Agent 错误: ' + (resData.error || '未知错误');
          errorArea.style.display = 'block';
        }
      } catch (err) {
        errorArea.textContent = '网络错误: ' + err.message;
        errorArea.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '🤖 启动 Agent';
      }
    });
  </script>
</body>
</html>
